<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="screen-orientation" content="landscape">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NEO-ROBO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Orientation prompt for mobile portrait -->
    <div id="orientation-prompt">
        <div class="rotate-icon">📱</div>
        <p>ROTATE YOUR DEVICE</p>
        <p style="font-size: 12px; opacity: 0.6;">Play in landscape mode</p>
    </div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <!-- START SCREEN -->
        <div id="start-screen" class="screen active">
            <div class="start-bg-animation"></div>
            <div class="start-content">
                <h1 id="game-title" class="glow-title">NEO-ROBO</h1>
                <button id="start-btn" class="sci-fi-btn">START</button>
                <p id="press-to-start" class="blink-text"> PRESS TO START </p>
            </div>
        </div>

        <!-- SELECTION SCREEN -->
        <div id="selection-screen" class="screen">
            <div class="selection-bg-animation"></div>
            <div class="selection-content">
                <h2 class="screen-title glow-title">SELECT YOUR ROBOT</h2>
                <div id="robot-showcase">
                    <div class="medal-frame">
                        <div class="medal-glow"></div>
                        <img id="selected-robot-img" src="" alt="Selected Robot">
                    </div>
                    <p id="selected-robot-name" class="robot-name"></p>
                </div>
                <div id="robot-carousel"></div>
                <button id="confirm-btn" class="confirm-btn">CONFIRM</button>
            </div>
        </div>

        <!-- LOADING SCREEN -->
        <div id="loading-screen" class="screen">
            <div class="loading-bg-animation"></div>
            <div class="loading-content">
                <h2 class="screen-title glow-title">LOADING</h2>
                <div class="loading-bar-container">
                    <div class="loading-bar-bg">
                        <div id="loading-bar" class="loading-bar"></div>
                    </div>
                    <p id="loading-percent" class="loading-text">0%</p>
                </div>
                <div class="loading-dots">
                    <span>.</span><span>.</span><span>.</span>
                </div>
            </div>
        </div>

        <!-- GAMEPLAY HUD -->
        <div id="game-hud" class="screen">
            <div id="hud-top-left">
                <div class="hud-bar-group">
                    <div class="hud-icon health-icon float-anim">❤</div>
                    <div class="hud-bar health-bar">
                        <div id="health-fill" class="bar-fill health-fill"></div>
                    </div>
                </div>
                <div class="hud-bar-group">
                    <div class="hud-icon energy-icon float-anim" id="energy-icon">⚡</div>
                    <div class="hud-bar energy-bar" id="energy-bar-container">
                        <div id="energy-fill" class="bar-fill energy-fill"></div>
                    </div>
                </div>
            </div>
            
            <div id="hud-top-right">
                <div class="hud-points">
                    <span class="hud-icon point-icon float-anim">🟡</span>
                    <span id="points-counter">0</span>
                </div>
                <button id="pause-btn" class="hud-pause-btn">𝗜𝗜</button>
            </div>

            <div id="controls-left">
                <button id="btn-left" class="control-btn arrow-btn">◀</button>
                <button id="btn-right" class="control-btn arrow-btn">▶</button>
            </div>

            <div id="controls-right">
                <button id="btn-jump" class="control-btn action-btn jump-btn">JUMP</button>
                <button id="btn-sonic" class="control-btn action-btn sonic-btn">SONIC</button>
            </div>

            <div class="keyboard-hint" id="keyboard-hint">
                ← → Move &nbsp;|&nbsp; SPACE Jump (x2) &nbsp;|&nbsp; F Sonic Wave &nbsp;|&nbsp; ESC Pause
            </div>
        </div>

        <!-- PAUSE MENU -->
        <div id="pause-menu" class="screen overlay">
            <div class="pause-panel">
                <h2 class="glow-title">PAUSED</h2>
                <button id="continue-btn" class="sci-fi-btn">CONTINUE</button>
                <button id="exit-btn" class="sci-fi-btn exit-btn">EXIT</button>
            </div>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="gameover-screen" class="screen">
            <div class="gameover-content">
                <h2 class="glow-title gameover-title">GAME OVER</h2>
                <p id="final-score" class="final-score">SCORE: 0</p>
                <button id="retry-btn" class="sci-fi-btn">RETRY</button>
                <button id="home-btn" class="sci-fi-btn exit-btn">HOME</button>
            </div>
        </div>

        <!-- VICTORY SCREEN -->
        <div id="victory-screen" class="screen">
            <div class="victory-content">
                <h2 class="glow-title victory-title">BOSS DEFEATED!</h2>
                <p id="victory-score" class="final-score">SCORE: 0</p>
                <button id="victory-continue-btn" class="sci-fi-btn">CONTINUE</button>
            </div>
        </div>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/game.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
